<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Redectio – Settings</title>

  <link rel="stylesheet" href="../css/style.css">
  <script src="https://unpkg.com/lucide@latest" defer></script>
  <script type="module" src="../app/layout.js"></script>
  <script type="module" src="../app/settings.js"></script>
</head>

<body data-theme="light" data-density="comfortable" data-page="settings">

  <div class="app-root">

    <!-- HEADER -->
    <div id="base-header"></div>

    <div class="app-shell">

      <!-- SIDEBAR -->
      <aside class="app-sidebar">
        <div id="base-sidebar"></div>
      </aside>

      <!-- MAIN SETTINGS PANEL -->
      <main class="app-main">
        <div class="settings-container">

          <!-- Breadcrumb -->
          <div class="settings-breadcrumb">
            <span class="crumb" data-nav="home">Home</span>
            <span class="crumb-sep">/</span>
            <span class="crumb-active">Settings</span>
          </div>

          <!-- Tabs -->
          <div class="settings-tabs">
            <button class="settings-tab settings-tab-active" data-tab="appearance">Appearance</button>
            <button class="settings-tab" data-tab="output">Output</button>
            <button class="settings-tab" data-tab="toolbar">Toolbar</button>
            <button class="settings-tab" data-tab="shortcuts">Shortcuts</button>
          </div>

          <!-- Appearance Panel -->
          <section class="settings-panel" data-tab-panel="appearance">
            <div class="setting-row vertical">
              <label>Theme</label>
              <div class="theme-options">
                <div class="theme-option" data-theme="light">
                  <i data-lucide="sun" class="icon-20"></i>
                  <span>Light</span>
                </div>
                <div class="theme-option" data-theme="dark">
                  <i data-lucide="moon" class="icon-20"></i>
                  <span>Dark</span>
                </div>
                <div class="theme-option" data-theme="system">
                  <i data-lucide="monitor" class="icon-20"></i>
                  <span>System</span>
                </div>
              </div>
            </div>

            <div class="setting-row vertical">
              <label>UI Density</label>
              <div class="density-options">
                <button class="density-option" data-density="comfortable">Comfortable</button>
                <button class="density-option" data-density="compact">Compact</button>
              </div>
            </div>

            <div class="setting-row vertical">
              <label>Default Redaction Color</label>
              <input id="settingDefaultColor" type="color" />
            </div>

            <div class="setting-row">
              <label>Sticky Search Bar</label>
              <input id="settingStickySearch" type="checkbox" />
            </div>

            <div class="setting-row">
              <label>Auto Highlight Mode</label>
              <input id="settingAutoHighlight" type="checkbox" />
            </div>
          </section>

          <!-- Output Panel -->
          <section class="settings-panel hidden" data-tab-panel="output">
            <div class="setting-row vertical">
              <label>Output File Name Pattern</label>
              <input id="settingOutputPattern" type="text" class="input-text" />

              <div class="pattern-buttons">
                <button data-token="{name}">+ Original Name</button>
                <button data-token="{date}">+ Date</button>
                <button data-token="{time}">+ Time</button>
                <button data-token="{redacted}">+ Redacted Suffix</button>
                <button data-token="{rejected}">+ Rejected Suffix</button>
              </div>

              <div class="field-label">Preview</div>
              <div id="settingOutputPreview" class="output-preview"></div>
            </div>
          </section>

          <!-- Toolbar Panel -->
          <section class="settings-panel hidden" data-tab-panel="toolbar">
            <div class="setting-row vertical">
              <label>Toolbar Customization</label>
              <div class="toolbar-list">
                <div class="toolbar-item" data-tool="selection">
                  <span class="toolbar-label">Selection Tools</span>
                  <button class="btn-eye" type="button"><i data-lucide="eye"></i></button>
                </div>
                <div class="toolbar-item" data-tool="undoRedo">
                  <span class="toolbar-label">Undo / Redo</span>
                  <button class="btn-eye" type="button"><i data-lucide="eye"></i></button>
                </div>
                <div class="toolbar-item" data-tool="zoomNav">
                  <span class="toolbar-label">Zoom & Navigation</span>
                  <button class="btn-eye" type="button"><i data-lucide="eye"></i></button>
                </div>
                <div class="toolbar-item" data-tool="aiDetection">
                  <span class="toolbar-label">AI Detection</span>
                  <button class="btn-eye" type="button"><i data-lucide="eye"></i></button>
                </div>
                <div class="toolbar-item" data-tool="applySave">
                  <span class="toolbar-label">Apply & Save</span>
                  <button class="btn-eye" type="button"><i data-lucide="eye"></i></button>
                </div>
              </div>
            </div>
          </section>

          <!-- Shortcuts Panel -->
          <section class="settings-panel hidden" data-tab-panel="shortcuts">
            <div class="setting-row vertical">
              <label>Keyboard Shortcuts</label>
              <div class="shortcuts-grid">
                <div class="shortcut-row"><span>Undo</span><span>Ctrl+Z</span></div>
                <div class="shortcut-row"><span>Redo</span><span>Ctrl+Y</span></div>
                <div class="shortcut-row"><span>Search</span><span>Ctrl+F</span></div>
                <div class="shortcut-row"><span>Next Page</span><span>→</span></div>
                <div class="shortcut-row"><span>Prev Page</span><span>←</span></div>
                <div class="shortcut-row"><span>Text Tool</span><span>T</span></div>
                <div class="shortcut-row"><span>Box Tool</span><span>B</span></div>
                <div class="shortcut-row"><span>Highlight Tool</span><span>H</span></div>
              </div>
            </div>
          </section>

          <div class="settings-save-row">
            <button id="btnSaveSettings" class="btn btn-primary">Save Settings</button>
          </div>

        </div>
      </main>

      <!-- EMPTY RIGHT PANEL (keeps layout consistent) -->
      <aside class="app-tools"></aside>

    </div>

    <!-- FOOTER -->
    <div id="base-footer"></div>

  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (window.lucide) window.lucide.createIcons();
    });
  </script>

</body>
</html>
