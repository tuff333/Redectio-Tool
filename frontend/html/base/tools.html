<section class="tools-panel">
  <div class="tools-tabs" role="tablist" aria-label="Tools and Plugins">
    <button
      id="btnToolsTab"
      class="tools-tab btn btn-toggle btn-small btn-toggle-active"
      type="button"
      role="tab"
      aria-selected="true"
      data-panel="tools"
    >
      <i data-lucide="wand-2" class="icon-20"></i>
      <span class="tab-text">Tools</span>
    </button>

    <button
      id="btnPluginsTab"
      class="tools-tab btn btn-toggle btn-small"
      type="button"
      role="tab"
      aria-selected="false"
      data-panel="plugins"
    >
      <i data-lucide="puzzle" class="icon-20"></i>
      <span class="tab-text">Plugins</span>
    </button>
  </div>

  <!-- TOOLS -->
  <div id="toolsModePanel" class="tools-mode-panel">
    <div class="tools-group">
      <div class="btn-row">
        <button id="btnModeSelectText" class="btn btn-toggle btn-small">
          <i data-lucide="type" class="icon-20"></i>
        </button>

        <button id="btnModeDrawBox" class="btn btn-toggle btn-small btn-toggle-active">
          <i data-lucide="square" class="icon-20"></i>
        </button>

        <button id="btnAutoBarcodes" class="btn btn-sm">
          <i data-lucide="scan-line" class="icon-20"></i>
        </button>
      </div>

      <div class="btn-row">
        <button id="btnUndo" class="btn btn-ghost btn-small">
          <i data-lucide="undo-2" class="icon-20"></i>
        </button>

        <button id="btnRedo" class="btn btn-ghost btn-small">
          <i data-lucide="redo-2" class="icon-20"></i>
        </button>
      </div>

      <div class="btn-row">
        <button id="btnAutoSuggest" class="btn btn-primary btn-small">
          <i data-lucide="sparkles" class="icon-20"></i>
          <span class="btn-text">Auto</span>
        </button>
      </div>

      <div class="btn-row">
        <button id="btnAutoApply" class="btn btn-ghost btn-small" disabled>
          <i data-lucide="check" class="icon-20"></i>
          <span class="btn-text">Apply</span>
        </button>
        <button id="btnAutoClear" class="btn btn-ghost btn-small" disabled>
          <i data-lucide="trash-2" class="icon-20"></i>
          <span class="btn-text">Clear</span>
        </button>
      </div>

      <div class="color-row">
        <input id="redactionColor" type="color" value="#000000" />
      </div>
    </div>
  </div>

  <!-- PLUGINS -->
  <section id="pluginsModePanel" class="tools-mode-panel hidden">
    <div id="pluginToolsContainer" class="plugin-tools-list"></div>
  </section>
</section>
