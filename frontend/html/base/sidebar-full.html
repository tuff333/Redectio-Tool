<aside class="sidebar">
  <div class="sidebar-inner">
  <div class="sidebar-header">
    <div class="sidebar-logo">
      <span class="logo-mark">R</span>
      <div class="logo-text">
        <span class="logo-title">Redectio</span>
        <span class="logo-subtitle">COA Redaction</span>
      </div>
    </div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item nav-item-active" data-nav="redaction" data-tooltip="Redaction">
      <i data-lucide="file-text" class="icon-20"></i>
      <span class="nav-label">Redaction</span>
    </button>

    <button class="nav-item" disabled data-tooltip="Batch (coming)">
      <i data-lucide="layers" class="icon-20"></i>
      <span class="nav-label">Batch (coming)</span>
    </button>

    <button class="nav-item" data-nav="settings" data-tooltip="Settings">
      <i data-lucide="settings" class="icon-20"></i>
      <span class="nav-label">Settings</span>
    </button>
  </nav>

  <section id="uploadSection" class="sidebar-section">
    <div class="sidebar-section-title">Upload</div>

    <div id="dropZone" class="dropzone">
      <input id="fileInput" type="file" accept="application/pdf" class="dropzone-input" />
      <div class="dropzone-inner">
        <i data-lucide="upload-cloud" class="icon-20 dropzone-icon"></i>
        <div class="dropzone-text-main">Click to upload or drag & drop</div>
        <div class="dropzone-text-sub">PDF only · max 50MB</div>
        <div id="fileName" class="dropzone-filename"></div>
      </div>
    </div>

    <div class="panel-actions">
      <button id="btnRedact" class="btn btn-primary" disabled>Apply Manual Redactions</button>
      <button id="btnClear" class="btn btn-ghost">Clear</button>
    </div>

    <div id="statusText" class="status-text"></div>
  </section>

  <section class="sidebar-footer">
    <div class="sidebar-section-title">Templates</div>
    <select id="companySelect"></select>
    <button id="btnSaveRule" class="btn btn-small btn-primary">
      <i data-lucide="save" class="icon-20"></i>
      Save Selected as Rule
    </button>
  </section>
  </div>
</aside>
